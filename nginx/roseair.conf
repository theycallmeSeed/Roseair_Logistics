# Roseair Logistics — Nginx production configuration
# Target domain: roseairlogistics.com (adjust server_name below)

upstream roseair_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name roseairlogistics.com www.roseairlogistics.com;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name roseairlogistics.com www.roseairlogistics.com;

    # SSL — adjust paths after Certbot
    ssl_certificate     /etc/letsencrypt/live/roseairlogistics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/roseairlogistics.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Modern TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Logs ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/roseair-access.log;
    error_log  /var/log/nginx/roseair-error.log;

    # ── Static assets (immutable cache) ───────────────────────────────
    location /assets/ {
        proxy_pass http://roseair_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SEO files ──────────────────────────────────────────────────────
    location = /robots.txt {
        proxy_pass http://roseair_backend;
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://roseair_backend;
        access_log off;
    }

    location = /favicon.ico {
        proxy_pass http://roseair_backend;
        access_log off;
    }

    location = /favicon.svg {
        proxy_pass http://roseair_backend;
        access_log off;
    }

    # ── Health endpoint ────────────────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass http://roseair_backend;
        proxy_cache off;
    }

    # ── All other traffic (SSR) ────────────────────────────────────────
    location / {
        proxy_pass http://roseair_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
